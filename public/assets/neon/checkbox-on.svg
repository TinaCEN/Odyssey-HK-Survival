<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Neon Checkbox On - NineSlice (insets: 4,4,4,4) -->
  <!-- Geometry: rect(2,2) 20x20 rx=3 — IDENTICAL to checkbox-off -->

  <!-- Active fill -->
  <rect x="2" y="2" width="20" height="20" rx="3" ry="3"
        fill="#001a1a" opacity="0.90"/>

  <!-- Glow border -->
  <rect x="2" y="2" width="20" height="20" rx="3" ry="3"
        fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.70"/>
  <!-- Sharp edge -->
  <rect x="2" y="2" width="20" height="20" rx="3" ry="3"
        fill="none" stroke="#aaffff" stroke-width="0.5" opacity="0.80"/>

  <!-- Checkmark -->
  <polyline points="6,12 10,17 18,7" fill="none"
            stroke="#00e5ff" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
