<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Neon Slider Thumb - NineSlice (insets: 8,8,8,8) -->
  <!-- Geometry: rect(4,4) 16x16 rx=4, max stroke=3 -->
  <!-- Constraint check: 4 + 4 + 3/2 = 9.5 > 8... use circle instead for thumb -->

  <!-- Filled circle thumb -->
  <circle cx="12" cy="12" r="8" fill="#008888"/>
  <circle cx="12" cy="12" r="8" fill="#00e5ff" opacity="0.55"/>

  <!-- Glow layer 1 -->
  <circle cx="12" cy="12" r="8" fill="none"
          stroke="#00e5ff" stroke-width="3" opacity="0.15"/>
  <!-- Sharp edge -->
  <circle cx="12" cy="12" r="8" fill="none"
          stroke="#ffffff" stroke-width="0.75" opacity="0.65"/>

  <!-- Highlight -->
  <circle cx="12" cy="10" r="4" fill="#ffffff" opacity="0.18"/>
</svg>
