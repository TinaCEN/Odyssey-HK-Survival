<svg xmlns="http://www.w3.org/2000/svg" width="12" height="32" viewBox="0 0 12 32">
  <defs>
    <linearGradient id="thumbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00fff2"/>
      <stop offset="100%" stop-color="#00bbb0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="10" height="30" rx="4" ry="4"
        fill="url(#thumbGrad)" stroke="#00fff2" stroke-width="0.5" filter="url(#glow)" opacity="0.9"/>
</svg>
